<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vida+ | Hospital</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <script src="https://unpkg.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Corrigindo propriedades de Português para Inglês */
        html, body { height: 100%; width: 100%; margin: 0; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(135deg, #f0f9f5 0%, #e6f4ed 50%, #d1ebe0 100%); 
            color: #1a3d2e; 
        }

        /* Modo Médico (Dark/Professional Mode) */
        body.modo-medico { 
            background: linear-gradient(135deg, #0f1f3d 0%, #1a3652 50%, #1e3a5f 100%); 
            color: #e8eef5; 
        }

        body.modo-medico .btn-primary { background: #1e5a96; color: white; }
        body.modo-medico .btn-primary:hover { background: #164d7d; }

        .font-display { font-family: 'Fraunces', serif; }

        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(8px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .pulse-dot { animation: pulseDot 2s ease-in-out infinite; }
        @keyframes pulseDot { 
            0%, 100% { transform: scale(1); opacity: 1; } 
            50% { transform: scale(1.3); opacity: 0.6; } 
        }

        .cross-pattern { 
            background-image: linear-gradient(#0d7a4a22 1px, transparent 1px), linear-gradient(90deg, #0d7a4a22 1px, transparent 1px); 
            background-size: 24px 24px; 
        }

        .btn-primary { 
            background: #0d7a4a; 
            color: white; 
            transition: all 0.25s ease; 
        }
        
        .btn-primary:hover { 
            background: #0a5f3a; 
            transform: translateY(-1px); 
            box-shadow: 0 8px 20px rgba(13, 122, 74, 0.25); 
        }

        .btn-primary:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
            transform: none; 
        }
    </style>
</head>
<body class="cross-pattern">

    <!-- Exemplo de Header -->
    <nav class="p-6 flex justify-between items-center bg-white/80 backdrop-blur-md border-b border-emerald-100 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white">
                <i data-lucide="plus-square"></i>
            </div>
            <span class="text-2xl font-bold font-display tracking-tight">Vida<span class="text-emerald-600">+</span></span>
        </div>
        
        <div class="flex gap-4">
            <button onclick="toggleMode()" class="p-2 hover:bg-emerald-50 rounded-full transition-colors">
                <i data-lucide="moon" class="w-5 h-5"></i>
            </button>
            <button class="btn-primary px-6 py-2 rounded-full font-medium flex items-center gap-2">
                <i data-lucide="calendar" class="w-4 h-4"></i>
                Agendar Consulta
            </button>
        </div>
    </nav>

    <!-- Exemplo de Conteúdo -->
    <main class="max-w-7xl mx-auto p-8">
        <header class="mb-12">
            <h1 class="text-4xl font-display font-bold mb-2">Olá, Dr. Silva</h1>
            <p class="text-emerald-800/70">Aqui está o resumo do hospital para hoje.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Card -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-50 relative overflow-hidden group">
                <div class="absolute top-4 right-4">
                    <span class="flex h-3 w-3">
                        <span class="pulse-dot absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                </div>
                <i data-lucide="users" class="w-8 h-8 text-emerald-600 mb-4"></i>
                <h3 class="text-3xl font-bold">42</h3>
                <p class="text-sm opacity-70">Pacientes em espera</p>
            </div>
        </div>
    </main>

    <script>
        // Inicializar ícones do Lucide
        lucide.createIcons();

        // Função para trocar o tema (Exemplo)
        function toggleMode() {
            document.body.classList.toggle('modo-medico');
        }
    </script>
</body>
</html>
